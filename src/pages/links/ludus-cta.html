<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludus — Join Waitlist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    background: #f8f8f5;
    color: #000;
    min-height: 100vh;
  }

  .im-section { padding: 88px 0 72px; }
  .im-bottom-cta {
    position: relative; z-index: 2; min-height: 770px;
    overflow: hidden; background: #f8f8f5;
    padding-top: 104px; padding-bottom: 168px;
  }
  .im-bottom-cta-wrap { position: relative; min-height: 510px; }

  /* ---- Parallax layer ---- */
  .im-bottom-cta-media {
    --im-mouse-x: 0; --im-mouse-y: 0;
    position: absolute; top:0;right:0;bottom:0;left:0; z-index:1;
  }

  /* ---- 6 outer parallax cards ---- */
  .im-cta-photo {
    position: absolute; display: grid;
    width: 96px; height: 96px; place-items: center;
    border: 1px solid rgb(0 0 0 / .08); border-radius: 22px;
    background: #ffffffe6;
    filter: drop-shadow(0 10px 14px rgb(0 0 0 / .12));
    cursor: pointer;
    transform: translate(
        calc(var(--im-mouse-x) * var(--im-px, 30px)),
        calc(var(--im-mouse-y) * var(--im-py, 30px)))
      rotate(var(--im-rot, 0deg));
    transition: transform .18s ease-out,
                border-radius .35s ease,
                filter .35s ease,
                border-color .35s ease;
  }
  .im-cta-photo img { width:70%; height:70%; border-radius:999px; object-fit:cover; pointer-events:none; }

  /* Hover: frozen by JS, visuals by this class */
  .im-cta-photo.is-hovered {
    border-radius: 34px;
    border-color: rgb(0 0 0 / .18);
    filter: drop-shadow(0 14px 22px rgb(0 0 0 / .18));
  }

  .im-cta-photo-1 { --im-px:-60px; --im-py: 40px; --im-rot: 7deg; top: 6%; left: 9%; }
  .im-cta-photo-2 { --im-px: 80px; --im-py:-40px; --im-rot:-8deg; top: 7%; right:11%; }
  .im-cta-photo-3 { --im-px:-35px; --im-py:-50px; --im-rot:-5deg; top:42%; left: 2%; width:78px; height:78px; }
  .im-cta-photo-4 { --im-px: 50px; --im-py: 42px; --im-rot: 7deg; top:48%; right:4%; width:78px; height:78px; }
  .im-cta-photo-5 { --im-px: 62px; --im-py:-62px; --im-rot:-11deg; left:15%; bottom:-10%; width:112px; height:112px; }
  .im-cta-photo-6 { --im-px:-55px; --im-py: 45px; --im-rot:12deg; right:15%; bottom:-14%; width:112px; height:112px; }

  /* ---- Central hub ---- */
  .im-center-card {
    position: absolute; top:50%; left:50%;
    display: grid; width:88px; height:88px; place-items:center;
    border:1px solid rgb(0 0 0 / .08); border-radius:24px;
    background:#fff; filter: drop-shadow(0 12px 18px rgb(0 0 0 / .10));
    margin:-44px 0 0 -44px; z-index:3;
    cursor: pointer;
    transform: translate(
      calc(var(--im-mouse-x) * 6px),
      calc(var(--im-mouse-y) * 6px));
    transition: transform .25s ease-out,
                border-radius .35s ease,
                filter .35s ease,
                border-color .35s ease;
  }
  .im-center-card img { width:68%; height:68%; border-radius:999px; object-fit:cover; pointer-events:none; }

  .im-center-card.is-hovered {
    border-radius: 36px;
    border-color: rgb(0 0 0 / .18);
    filter: drop-shadow(0 16px 26px rgb(0 0 0 / .18));
  }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    .im-section { padding:72px 0; }
    .im-bottom-cta { min-height:650px; padding-bottom:96px; }
    .im-cta-photo-1 { top:30%; left:-42px; }
    .im-cta-photo-2 { top:30%; right:-42px; }
    .im-cta-photo-3 { top: 3%; left:-10px; }
    .im-cta-photo-4 { top: 4%; right:-12px; }
    .im-cta-photo-5 { left:-12px; bottom:-18px; }
    .im-cta-photo-6 { right:-12px; bottom:-18px; }
    .im-center-card { width:68px; height:68px; margin:-34px 0 0 -34px; }
  }
</style>
</head>
<body>

<section id="join-waitlist" class="im-section im-bottom-cta">
  <div class="im-bottom-cta-wrap">

    <div class="im-bottom-cta-media" aria-hidden="true">

      <!-- 6 parallax cards (add data-url for click navigation) -->
      <div class="im-cta-photo im-cta-photo-1" data-url="https://openai.com/index/codex/"><img src="agents/codex.svg" alt=""></div>
      <div class="im-cta-photo im-cta-photo-2" data-url="https://claude.ai"><img src="agents/claude-code.svg" alt=""></div>
      <div class="im-cta-photo im-cta-photo-3" data-url="https://cursor.com"><img src="agents/cursor.svg" alt=""></div>
      <div class="im-cta-photo im-cta-photo-4" data-url="https://devin.ai"><img src="agents/devin.svg" alt=""></div>
      <div class="im-cta-photo im-cta-photo-5" data-url="https://gemini.google.com"><img src="agents/gemini.svg" alt=""></div>
      <div class="im-cta-photo im-cta-photo-6" data-url="https://grok.com"><img src="agents/grok.svg" alt=""></div>

      <!-- Central hub -->
      <div class="im-center-card" data-url="https://ludus.my">
        <img src="ludus-icon.svg" alt="">
      </div>

    </div>

  </div>
</section>

<script>
(function () {
  const media   = document.querySelector('.im-bottom-cta-media');
  const section = document.getElementById('join-waitlist');
  if (!media || !section) return;

  /* ---- Mouse parallax ---- */
  section.addEventListener('mousemove', function (e) {
    const r = section.getBoundingClientRect();
    media.style.setProperty('--im-mouse-x', ((e.clientX - r.left) / r.width)  * 2 - 1);
    media.style.setProperty('--im-mouse-y', ((e.clientY - r.top)  / r.height) * 2 - 1);
  });

  section.addEventListener('mouseleave', function () {
    media.style.setProperty('--im-mouse-x', '0');
    media.style.setProperty('--im-mouse-y', '0');
  });

  /* ---- Hover freeze + click for all cards ---- */
  const allCards = media.querySelectorAll('.im-cta-photo, .im-center-card');

  allCards.forEach(function (card) {

    /* Click → navigate to data-url */
    card.addEventListener('click', function (e) {
      const url = card.getAttribute('data-url');
      if (url) window.open(url, '_blank');
    });

    /* Hover: freeze position + visual feedback */
    card.addEventListener('mouseenter', function () {
      /* Snapshot current rendered transform */
      const style = getComputedStyle(card);
      const matrix = new DOMMatrixReadOnly(style.transform);
      /* Apply frozen transform (add slight scale-down for灵动感) */
      card.style.transform =
        `translate(${matrix.m41.toFixed(1)}px, ${matrix.m42.toFixed(1)}px) ` +
        `rotate(${Math.atan2(matrix.m21, matrix.m11) * (180/Math.PI).toFixed(1)}deg) ` +
        `scale(0.92)`;
      card.classList.add('is-hovered');
    });

    card.addEventListener('mouseleave', function () {
      /* Remove freeze → CSS variables take over again */
      card.style.transform = '';
      card.classList.remove('is-hovered');
    });
  });
})();
</script>

</body>
</html>
